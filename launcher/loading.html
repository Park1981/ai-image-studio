<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>AI Image Studio 시작 중</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f4f1;
      --surface: #ffffff;
      --ink: #1f1f1f;
      --muted: #787878;
      --line: #e6e2dc;
      --accent: #4a9eff;
      --green: #3e9912;
      --terminal: #1f1e1b;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background:
        repeating-linear-gradient(
          -45deg,
          rgba(31, 31, 31, .035) 0,
          rgba(31, 31, 31, .035) 8px,
          transparent 8px,
          transparent 18px
        ),
        var(--bg);
      color: var(--ink);
      font-family: "Segoe UI", system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background: rgba(245, 244, 241, .62);
      backdrop-filter: blur(5px);
    }

    main {
      position: relative;
      z-index: 1;
      width: min(560px, calc(100vw - 40px));
      border: 1px solid var(--line);
      border-radius: 14px;
      background: var(--surface);
      padding: 28px;
      box-shadow: 0 20px 56px rgba(23, 20, 14, .16);
    }

    .kicker {
      margin-bottom: 10px;
      color: #9a9690;
      font-family: "Consolas", "SFMono-Regular", monospace;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: .16em;
    }

    h1 {
      margin: 0 0 8px;
      font-size: 27px;
      line-height: 1.2;
      letter-spacing: 0;
    }

    p {
      margin: 0;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.6;
    }

    .terminal {
      margin-top: 22px;
      padding: 18px;
      min-height: 154px;
      border-radius: 10px;
      background: var(--terminal);
      color: #dedbd2;
      font-family: "Consolas", "SFMono-Regular", monospace;
      font-size: 13px;
      line-height: 1.7;
      box-shadow: inset 0 0 0 1px rgba(255, 255, 255, .05);
    }

    .line { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .time { color: #8f8b84; margin-right: 8px; }
    .ok { color: #9bcf9a; font-weight: 700; }
    .run { color: #f1eee7; font-weight: 700; }
    .cursor { display: inline-block; width: 7px; height: 14px; margin-left: 5px; background: #f1eee7; vertical-align: -2px; animation: blink 1s steps(2) infinite; }

    @keyframes blink { 50% { opacity: 0; } }

    .bar {
      height: 7px;
      margin: 18px 0 10px;
      overflow: hidden;
      border-radius: 999px;
      background: #eeece8;
    }

    .fill {
      width: 8%;
      height: 100%;
      border-radius: inherit;
      background: linear-gradient(90deg, var(--ink), var(--accent));
      transition: width .35s ease;
    }

    .row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      color: var(--muted);
      font-size: 12.5px;
      font-weight: 600;
    }
  </style>
</head>
<body>
  <main>
    <div class="kicker" id="kicker">BOOT · 01 / 04</div>
    <h1>AI Image Studio 시작 중</h1>
    <p>부팅 로그를 보여드릴게요. 이상 없으면 곧 메인이 열려요.</p>

    <div class="terminal" aria-label="부팅 로그">
      <div class="line"><span class="time">00:00.00</span><span class="run">[boot]</span> Chrome app window mounted</div>
      <div class="line"><span class="time">00:00.18</span><span class="ok">[ok]</span> launcher profile ready</div>
      <div class="line" id="log-frontend"><span class="time">00:00.42</span><span class="run">[run]</span> frontend -> http://127.0.0.1:3000</div>
      <div class="line" id="log-wait"><span class="time">00:00.64</span><span class="run">[run]</span> waiting for ready event...</div>
      <div class="line"><span id="elapsed">00:00.00</span> $<span class="cursor"></span></div>
    </div>

    <div class="bar" aria-label="시작 진행률">
      <div class="fill" id="fill"></div>
    </div>
    <div class="row">
      <span id="status">Frontend 준비 중</span>
      <span id="percent">8%</span>
    </div>
  </main>

  <script>
    const target = "http://localhost:3000/loading";
    const probeUrl = "http://localhost:3000/favicon.ico";
    const start = Date.now();
    const fill = document.getElementById("fill");
    const status = document.getElementById("status");
    const percent = document.getElementById("percent");
    const elapsed = document.getElementById("elapsed");
    const kicker = document.getElementById("kicker");
    const logWait = document.getElementById("log-wait");
    let progress = 8;

    function stamp() {
      const ms = Date.now() - start;
      const s = Math.floor(ms / 1000);
      const cs = Math.floor((ms % 1000) / 10);
      return `00:${String(s).padStart(2, "0")}.${String(cs).padStart(2, "0")}`;
    }

    function paint(next, text, bootStep) {
      progress = Math.max(progress, Math.min(next, 96));
      fill.style.width = progress + "%";
      percent.textContent = Math.round(progress) + "%";
      if (text) status.textContent = text;
      if (bootStep) kicker.textContent = `BOOT · ${bootStep} / 04`;
    }

    setInterval(() => {
      elapsed.textContent = stamp();
      if (progress < 88) paint(progress + Math.random() * 4, "Frontend 준비 중", "02");
    }, 600);

    function probe() {
      const img = new Image();
      img.onload = () => {
        logWait.innerHTML = `<span class="time">${stamp()}</span><span class="ok">[ok]</span> frontend ready`;
        paint(100, "앱 로딩 화면으로 이동 중", "04");
        setTimeout(() => window.location.replace(target), 260);
      };
      img.onerror = () => {
        paint(progress + 2, "Frontend 준비 중", "03");
        setTimeout(probe, 1000);
      };
      img.src = probeUrl + "?t=" + Date.now();
    }

    probe();
  </script>
</body>
</html>
