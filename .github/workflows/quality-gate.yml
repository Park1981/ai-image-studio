name: Quality Gate

# 2026-04-27 (C2-P2-2): backend + frontend 통합 품질 게이트.
# 검증: ruff / pytest / tsc / lint / vitest / next build.
# 트리거: master push + 모든 PR.

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  # 수동 실행도 허용 (workflow_dispatch)
  workflow_dispatch:

# 같은 브랜치에 새 push 들어오면 옛 run 자동 취소 (CI 시간 절약).
concurrency:
  group: quality-gate-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend (ruff + pytest)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff pytest pytest-asyncio

      - name: Ruff
        run: ruff check .

      - name: Pytest
        run: pytest tests/ -q

  frontend:
    name: Frontend (tsc + lint + test + build)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        # ci 가 lockfile 강제 동기화 (재현 가능 빌드)
        run: npm ci

      - name: TypeScript check
        run: npx tsc --noEmit

      - name: Lint (eslint)
        run: npm run lint

      - name: Tests (vitest)
        run: npm test -- --run

      - name: Build (next)
        # NEXT_PUBLIC_USE_MOCK=true — backend 없는 CI 환경에서 mock 모드로 빌드.
        env:
          NEXT_PUBLIC_USE_MOCK: "true"
        run: npm run build
